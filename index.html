<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKER TEAM OFC</title>

<style>
body {
    margin:0;
    background:black;
    overflow:hidden;
    font-family: monospace;
}

/* MATRIX */
canvas {
    position: fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* CENTER BOX */
.main {
    position: absolute;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
    text-align:center;
    color:#00ff00;
}

/* TITLE */
h1 {
    font-size:50px;
    text-shadow:0 0 20px #00ff00;
    margin:0;
}

/* SUBTEXT */
.text {
    margin-top:20px;
    font-size:20px;
    letter-spacing:2px;
}

/* BUTTON */
.btn {
    display:inline-block;
    margin-top:30px;
    padding:12px 30px;
    border:2px solid #00ff00;
    color:#00ff00;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.btn:hover {
    background:#00ff00;
    color:black;
    box-shadow:0 0 20px #00ff00;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="main">
    <h1>HACKER TEAM OFC</h1>
    <div class="text">Access Granted... Welcome Hacker</div>
    <a href="https://t.me/+8ZDskkfPOmE3MDZl" class="btn">JOIN TELEGRAM</a>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01HACKERTEAMOFC";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for (let i = 0; i < columns; i++) {
    drops[i] = 1;
}

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0f0";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
